<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --navy: #0B1C3D;
            --gold: #C9952A;
            --gold-light: #F5D78E;
            --teal: #0F7B6C;
            --red: #B91C1C;
            --bg: #F4F1EC;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(201,149,42,0.4); }
            70%  { box-shadow: 0 0 0 12px rgba(201,149,42,0); }
            100% { box-shadow: 0 0 0 0 rgba(201,149,42,0); }
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .anim-fade-up   { animation: fadeUp 0.45s ease-out both; }
        .pulse-gold     { animation: pulse-ring 1.8s infinite; }
        .spin           { animation: spin 1s linear infinite; }

        .btn-primary {
            background: var(--navy);
            color: #fff;
            border-radius: 8px;
            font-weight: 700;
            padding: 12px 24px;
            transition: background .2s, transform .1s;
            cursor: pointer;
            border: none;
        }
        .btn-primary:hover  { background: #162d5c; transform: translateY(-1px); }
        .btn-primary:active { transform: scale(.98); }
        .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

        .btn-gold {
            background: var(--gold);
            color: #fff;
            border-radius: 8px;
            font-weight: 700;
            padding: 12px 24px;
            transition: background .2s;
            cursor: pointer;
            border: none;
        }
        .btn-gold:hover { background: #b8851f; }

        .card-module { border: 1.5px solid #e2ddd4; border-radius: 12px; background: #fff; }
        .pasal-card  { border-left: 4px solid var(--red); background: #fef2f2; border-radius: 0 8px 8px 0; }
        .pasal-card.teal { border-left-color: var(--teal); background: #f0fdf4; }
        .pasal-card.gold { border-left-color: var(--gold); background: #fffbeb; }

        /* PRINT */
        @media print {
            .no-print, .no-print * { display: none !important; }
            .print-area { display: block !important; position: absolute; top:0; left:0; width:100%; background:#fff; z-index:9999; }
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
            @page { size: A4 landscape; margin: 0; }
        }
        .print-area { display: none; }

        /* Progress bar */
        .prog-track { height: 6px; background: #e5e7eb; border-radius: 99px; }
        .prog-fill   { height: 6px; background: var(--gold); border-radius: 99px; transition: width .4s ease; }

        /* Option buttons */
        .opt-btn {
            display: block; width: 100%; text-align: left; padding: 14px 16px;
            border: 1.5px solid #d1d5db; border-radius: 10px; background: #fff;
            font-size: .875rem; font-weight: 500; cursor: pointer;
            transition: border-color .15s, background .15s;
        }
        .opt-btn:hover { border-color: var(--navy); background: #f0f4ff; }

        /* Danger table */
        table.hukum { width: 100%; border-collapse: collapse; font-size: .78rem; }
        table.hukum th { background: var(--navy); color: #fff; padding: 8px 10px; text-align: left; }
        table.hukum td { padding: 7px 10px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
        table.hukum tr:nth-child(even) td { background: #f9fafb; }

        /* Certificate */
        .cert-wrap { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; padding: 20px; }
        .cert-inner { border: 6px double var(--gold); padding: 40px; max-width: 900px; width: 100%; position: relative; text-align: center; }
    </style>
</head>

        if(p.modules&&p.modules.length>0) setModules(p.modules);
        else randomize();
        if(p.step&&p.step!=='intro'){ setRestored(true); setTimeout(()=>setRestored(false),3000); }
        return;
      }catch(e){ localStorage.removeItem(STORAGE_KEY); }
    }
    randomize();
  },[]);

  const randomize = () => {
    const r = MODULES.map(m=>({
      ...m,
      quizzes: [...m.quizzes].sort(()=>0.5-Math.random()).slice(0,3)
    }));
    setModules(r);
  };

  // Autosave
  useEffect(()=>{
    if(modules.length>0)
      localStorage.setItem(STORAGE_KEY, JSON.stringify({form,score,curMod,step,scenIdx,quizIdx,modules}));
  },[form,score,curMod,step,scenIdx,quizIdx,modules]);

  // Timer anti-speedrun
  useEffect(()=>{
    if(step==='materi'){
      setCan(false); setTimeLeft(READ_TIME);
      const t = setInterval(()=>setTimeLeft(p=>{
        if(p<=1){ clearInterval(t); setCan(true); return 0; }
        return p-1;
      }),1000);
      return ()=>clearInterval(t);
    } else { setCan(true); }
  },[step,curMod]);

  // ── HANDLERS ──
  const reset = () => { if(confirm('Hapus progres dan mulai ulang?')){ localStorage.removeItem(STORAGE_KEY); window.location.reload(); }};
  const chgForm = e => setForm({...form,[e.target.name]:e.target.value});

  const next = () => {
    if(!canProceed && step==='materi') return;
    setFb(null);
    if(step==='intro') setStep('materi');
    else if(step==='materi'){ setStep('scenario'); setScenIdx(0); }
    else if(step==='scenario'){
      if(scenIdx < modules[curMod].scenarios.length-1) setScenIdx(s=>s+1);
      else { setStep('quiz'); setQuizIdx(0); }
    }
    else if(step==='quiz'){
      if(quizIdx < modules[curMod].quizzes.length-1) setQuizIdx(q=>q+1);
      else {
        if(curMod < modules.length-1){ setCurMod(m=>m+1); setStep('materi'); }
        else setStep('summary');
      }
    }
  };

  const pickScenario = opt => setFb({type:opt.type, msg:opt.fb});
  const pickQuiz = idx => {
    const correct = idx === modules[curMod].quizzes[quizIdx].ans;
    if(correct){ setScore(s=>s+1); setFb({type:'success',msg:'Tepat! +1 Poin'}); }
    else setFb({type:'error',msg:`Jawaban kurang tepat. Pelajari kembali materi modul ini.`});
  };

  const submit = async () => {
    if(!form.nama||!form.nik){ alert('Lengkapi Nama dan NIK terlebih dahulu.'); return; }
    setSub(true);
    try{ await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({...form,skor:score,persen:finalPct})}); }
    catch(e){}
    setSub(false); setStep('success');
  };

  // MENGUBAH ALUR FUNGSI CETAK DI SINI
  const print = (mode) => { 
      if (window.__triggerPrint) {
          window.__triggerPrint(mode);
      }
  };
  
  const retake = () => { setScore(0); setCurMod(0); setStep('materi'); setScenIdx(0); setQuizIdx(0); setFb(null); };

  if(modules.length===0) return <div className="min-h-screen flex items-center justify-center text-gray-500">Memuat modul…</div>;

  const totalQ   = modules.length * 3;
  const passQ    = Math.ceil(totalQ * PASS_PCT / 100);
  const isPassed = score >= passQ;
  const finalPct = Math.round((score/totalQ)*100);
  const progPct  = ((curMod + (['summary','form','success'].includes(step)?1:0)) / modules.length)*100;

  const colorMap = { red:'#B91C1C', blue:'#1D4ED8', green:'#0F7B6C', gray:'#374151', teal:'#0F7B6C' };
  const modColor = modules[curMod]?.color ? colorMap[modules[curMod].color] : '#0B1C3D';

  return (
    <div className="min-h-screen flex flex-col items-center py-6 px-4 no-print" style={{background:'var(--bg)'}}>
      {restored && (
        <div className="fixed top-4 right-4 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg z-50 text-sm font-bold anim-fade-up">
          ✓ Progres dipulihkan
        </div>
      )}

      <div className="w-full max-w-lg bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col" style={{minHeight:620,border:'1px solid #e2ddd4'}}>

        {/* HEADER */}
        <div style={{background:'var(--navy)'}} className="p-5 text-white">
          <div className="flex justify-between items-center">
            <div className="flex items-center gap-3">
              <img src={LOGO_URL} className="w-9 h-9 object-contain bg-white rounded-full p-1" alt="logo"/>
              <div>
                <p className="font-bold text-base leading-tight">Portal Integritas</p>
                <p className="text-xs" style={{color:'#93c5fd'}}>Kopkar Adaro Karya Mandiri</p>
              </div>
            </div>
            {['materi','scenario','quiz'].includes(step) && (
              <div className="text-right">
                <p className="text-xs opacity-60">Modul</p>
                <p className="font-black text-xl">{curMod+1}/{modules.length}</p>
              </div>
            )}
          </div>
        </div>

        {/* PROGRESS */}
        {['materi','scenario','quiz'].includes(step) && (
          <div className="prog-track mx-0">
            <div className="prog-fill" style={{width:`${progPct}%`}}/>
          </div>
        )}

        {/* MODULE LABEL */}
        {['materi','scenario','quiz'].includes(step) && (
          <div className="px-6 pt-4 pb-0">
            <div className="flex items-center gap-2">
              <div className="w-2 h-2 rounded-full" style={{background:modColor}}/>
              <span className="text-xs font-bold uppercase tracking-wide" style={{color:modColor}}>
                MODUL {curMod+1}: {modules[curMod].subtitle}
              </span>
            </div>
          </div>
        )}

        {/* BODY */}
        <div className="flex-grow p-6 overflow-y-auto">

          {/* INTRO */}
          {step==='intro' && (
            <div className="text-center py-8 space-y-5 anim-fade-up">
              <div className="w-20 h-20 rounded-full flex items-center justify-center mx-auto pulse-gold" style={{background:'var(--navy)'}}>
                <I name="shield" className="w-10 h-10 text-white"/>
              </div>
              <div>
                <h2 className="text-2xl font-black text-gray-900" style={{fontFamily:'"DM Serif Display",serif'}}>Edukasi Anti-Fraud</h2>
                <p className="text-sm text-gray-500 mt-1">Koperasi Adaro Karya Mandiri</p>
              </div>
              <div className="text-left bg-gray-50 rounded-xl p-4 text-sm text-gray-600 space-y-2">
                <p>📚 <strong>5 Modul</strong> — dari anatomi fraud hingga hukum koperasi</p>
                <p>⚖️ Sanksi pidana <strong>lengkap dengan pasal & denda</strong></p>
                <p>🏆 Sertifikat digital untuk peserta lulus <strong>≥{PASS_PCT}%</strong></p>
                <p>📋 Surat pernyataan komitmen untuk arsip HRD</p>
              </div>
              <button onClick={next} className="btn-primary w-full flex items-center justify-center gap-2 text-base">
                Mulai Pelatihan <I name="arrow"/>
              </button>
            </div>
          )}

          {/* MATERI */}
          {step==='materi' && (
            <div className="anim-fade-up">
              <h2 className="text-xl font-black text-gray-900 mb-1" style={{fontFamily:'"DM Serif Display",serif'}}>
                {modules[curMod].title}
              </h2>
              <div className="mb-6">{modules[curMod].content}</div>
              <button
                onClick={next}
                disabled={!canProceed}
                className="btn-primary w-full flex items-center justify-center gap-2 disabled:opacity-50"
                style={{background: canProceed ? 'var(--navy)' : '#9ca3af', cursor: canProceed?'pointer':'not-allowed'}}
              >
                {canProceed
                  ? <><I name="brain"/> Mulai Studi Kasus</>
                  : <><I name="clock" className="w-4 h-4 spin"/> Baca materi dulu ({timeLeft}s)</>
                }
              </button>
            </div>
          )}

          {/* SCENARIO */}
          {step==='scenario' && (
            <div className="anim-fade-up">
              <span className="text-xs font-bold px-2 py-1 rounded-full" style={{background:'#fef9c3',color:'#92400e'}}>
                STUDI KASUS {scenIdx+1}/{modules[curMod].scenarios.length}
              </span>
              <h3 className="text-lg font-bold text-gray-900 mt-3 mb-2">{modules[curMod].scenarios[scenIdx].title}</h3>
              <p className="text-sm text-gray-600 mb-6 leading-relaxed">{modules[curMod].scenarios[scenIdx].desc}</p>

              {!feedback ? (
                <div className="space-y-3">
                  {modules[curMod].scenarios[scenIdx].opts.map((o,i)=>(
                    <button key={i} className="opt-btn" onClick={()=>pickScenario(o)}>{o.text}</button>
                  ))}
                </div>
              ) : (
                <div className={`p-5 rounded-xl border-2 anim-fade-up ${feedback.type==='success'?'bg-green-50 border-green-300':'bg-red-50 border-red-300'}`}>
                  <div className="flex items-center gap-2 font-bold text-base mb-2">
                    {feedback.type==='success'
                      ? <><I name="check" className="w-5 h-5 text-green-600"/> <span className="text-green-700">Tepat!</span></>
                      : <><I name="x" className="w-5 h-5 text-red-600"/> <span className="text-red-700">Kurang Tepat</span></>
                    }
                  </div>
                  <p className="text-sm text-gray-700 mb-4">{feedback.msg}</p>
                  <button onClick={next} className="btn-primary w-full">Lanjut →</button>
                </div>
              )}
            </div>
          )}

          {/* QUIZ */}
          {step==='quiz' && (
            <div className="anim-fade-up">
              <span className="text-xs font-bold px-2 py-1 rounded-full" style={{background:'#ede9fe',color:'#5b21b6'}}>
                KUIS {quizIdx+1}/{modules[curMod].quizzes.length} • Skor: {score}
              </span>
              <p className="font-bold text-lg text-gray-900 mt-4 mb-6">{modules[curMod].quizzes[quizIdx].q}</p>

              {!feedback ? (
                <div className="space-y-3">
                  {modules[curMod].quizzes[quizIdx].opts.map((o,i)=>(
                    <button key={i} className="opt-btn" onClick={()=>pickQuiz(i)}>{o}</button>
                  ))}
                </div>
              ) : (
                <div className="text-center py-6 anim-fade-up">
                  <div className={`text-3xl font-black mb-2 ${feedback.type==='success'?'text-green-600':'text-red-500'}`}>
                    {feedback.type==='success'?'✓':'✗'}
                  </div>
                  <p className={`font-bold mb-1 ${feedback.type==='success'?'text-green-700':'text-red-600'}`}>{feedback.msg}</p>
                  <button onClick={next} className="btn-primary mt-5 px-10">Lanjut</button>
                </div>
              )}
            </div>
          )}

          {/* SUMMARY */}
          {step==='summary' && (
            <div className="text-center py-8 anim-fade-up">
              <div className="text-6xl mb-4">{isPassed?'🎓':'📚'}</div>
              <h2 className="text-2xl font-black mb-1" style={{fontFamily:'"DM Serif Display",serif'}}>
                {isPassed ? 'Selamat, Anda Lulus!' : 'Belum Memenuhi Syarat'}
              </h2>
              <div className={`text-5xl font-black my-4 ${isPassed?'text-green-600':'text-red-500'}`}>{finalPct}%</div>
              <p className="text-gray-500 text-sm mb-6">Benar: {score} dari {totalQ} soal</p>
              <p className="text-gray-600 text-sm px-4 mb-8">
                {isPassed
                  ? `Nilai Anda memenuhi standar minimum ${PASS_PCT}%. Isi lembar komitmen untuk mendapatkan sertifikat digital.`
                  : `Nilai minimum kelulusan adalah ${PASS_PCT}%. Silakan pelajari ulang materi dan coba lagi.`
                }
              </p>
              {isPassed
                ? <button onClick={()=>setStep('form')} className="btn-primary w-full">Lanjut ke Lembar Komitmen →</button>
                : <button onClick={retake} className="btn-gold w-full flex items-center justify-center gap-2">
                    <I name="refresh"/> Ulangi Pelatihan
                  </button>
              }
            </div>
          )}

          {/* FORM */}
          {step==='form' && (
            <div className="space-y-4 anim-fade-up">
              <h3 className="text-xl font-black text-gray-900" style={{fontFamily:'"DM Serif Display",serif'}}>Lembar Komitmen</h3>
              <p className="text-sm text-gray-500">Isi data di bawah ini untuk mencetak sertifikat dan surat pernyataan.</p>
              <div className="space-y-3">
                {[{l:'Nama Lengkap',n:'nama'},{l:'NIK / NIP',n:'nik'},{l:'Unit Kerja',n:'unit'},{l:'No. HP',n:'hp'}].map(f=>(
                  <div key={f.n}>
                    <label className="text-xs font-bold uppercase text-gray-500">{f.l}</label>
                    <input name={f.n} value={form[f.n]} onChange={chgForm}
                      className="w-full mt-1 p-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"/>
                  </div>
                ))}
                <div>
                  <label className="text-xs font-bold uppercase text-gray-500">Jabatan</label>
                  <select name="jabatan" value={form.jabatan} onChange={chgForm}
                    className="w-full mt-1 p-3 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:border-blue-500">
                    <option>Karyawan</option>
                    <option>Staff Administrasi</option>
                    <option>Supervisor</option>
                    <option>Manager</option>
                    <option>Pengurus</option>
                    <option>Pengawas</option>
                    <option>Pengelola</option>
                    <option>Anggota</option>
                  </select>
                </div>
              </div>
              <button onClick={submit} disabled={submitting}
                className="btn-primary w-full flex items-center justify-center gap-2 mt-4" style={{padding:'14px'}}>
                {submitting ? 'Menyimpan…' : <><I name="save"/> Simpan &amp; Proses</>}
              </button>
            </div>
          )}

          {/* SUCCESS */}
          {step==='success' && (
            <div className="text-center py-8 anim-fade-up">
              <div className="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
                <I name="check" className="w-8 h-8 text-green-600"/>
              </div>
              <h2 className="text-xl font-black text-gray-900 mb-2">Data Tersimpan!</h2>
              <p className="text-sm text-gray-500 mb-6 px-4">Terima kasih, <strong>{form.nama}</strong>. Unduh dokumen Anda:</p>
              <div className="space-y-3 px-2">
                <button onClick={()=>print('form')}
                  className="w-full flex items-center gap-3 p-4 border-2 border-gray-200 rounded-xl hover:bg-gray-50 transition text-left">
                  <I name="file" className="w-6 h-6 text-gray-500"/>
                  <div>
                    <p className="font-bold text-sm">Cetak Surat Pernyataan</p>
                    <p className="text-xs text-gray-400">Wajib diserahkan ke HRD</p>
                  </div>
                </button>
                <button onClick={()=>print('certificate')}
                  className="w-full flex items-center gap-3 p-4 rounded-xl transition text-left text-white"
                  style={{background:'linear-gradient(135deg,var(--gold),#b8851f)'}}>
                  <I name="award" className="w-6 h-6 text-white"/>
                  <div>
                    <p className="font-bold text-sm">Cetak Sertifikat Kelulusan</p>
                    <p className="text-xs text-yellow-200">Skor: {finalPct}% — LULUS KOMPETEN</p>
                  </div>
                </button>
              </div>
            </div>
          )}

        </div>

        {/* FOOTER */}
        <div className="border-t p-3 flex justify-center bg-gray-50 no-print">
          <button onClick={reset} className="flex items-center gap-1.5 text-xs text-gray-400 hover:text-red-500 transition">
            <I name="refresh" className="w-3 h-3"/> Hapus Progres
          </button>
        </div>
      </div>
    </div>
  );
};

      </ol>
      <div style={{marginTop:50,display:'flex',justifyContent:'space-between',padding:'0 40px'}}>
        <div style={{textAlign:'center'}}>
          <div style={{marginBottom:70}}>Yang Menyatakan,</div>
          <div style={{fontWeight:'bold',textDecoration:'underline',fontSize:14}}>{data.nama}</div>
          <div style={{fontSize:11,color:'#555'}}>{data.jabatan}</div>
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{marginBottom:70}}>Mengetahui,</div>
          <div style={{fontWeight:'bold',textDecoration:'underline',minWidth:160}}>( ________________ )</div>
          <div style={{fontSize:11,color:'#555'}}>Ketua Pengurus Kopkar AKM</div>

        ID Dokumen: {valId} • Diterbitkan melalui Sistem Akademi Integritas Kopkar AKM

  return (
    <div className="print-area">

          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',opacity:.04,pointerEvents:'none'}}>
            <svg width="400" height="400" viewBox="0 0 24 24" fill="none" stroke="#0B1C3D" strokeWidth=".5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,marginBottom:24}}>
            <img src={LOGO_URL} style={{width:56,height:56,objectFit:'contain'}} alt="logo"/>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:11,letterSpacing:'3px',color:'#666',textTransform:'uppercase'}}>Akademi Integritas</div>
              <div style={{fontSize:18,fontWeight:700,color:'#0B1C3D'}}>KOPKAR AKM</div>
            </div>
          </div>
          <div style={{fontSize:48,fontWeight:700,color:'#C9952A',letterSpacing:2,marginBottom:4,fontFamily:'"DM Serif Display",serif'}}>SERTIFIKAT</div>

          </p>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',padding:'0 40px',marginTop:20}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:12,color:'#777',marginBottom:60}}>{today}</div>
              <div style={{borderTop:'1px solid #aaa',paddingTop:6,width:160}}>
                <div style={{fontWeight:700,color:'#0B1C3D'}}>Divisi Kepatuhan</div>
                <div style={{fontSize:11,color:'#666'}}>Fasilitator Program</div>
              </div>

            <div style={{width:88,height:88,borderRadius:'50%',background:'#C9952A',display:'flex',alignItems:'center',
              justifyContent:'center',color:'#fff',fontWeight:900,fontSize:13,border:'3px solid #F5D78E',
              transform:'rotate(15deg)',boxShadow:'0 4px 20px rgba(201,149,42,0.4)'}}>
              LULUS<br/>{pct}%

            <div style={{textAlign:'center'}}>
              <div style={{fontSize:12,color:'#777',marginBottom:60}}>Mengetahui,</div>
              <div style={{borderTop:'1px solid #aaa',paddingTop:6,width:160}}>
                <div style={{fontWeight:700,color:'#0B1C3D'}}>Ketua Pengurus</div>
                <div style={{fontSize:11,color:'#666'}}>Kopkar AKM</div>
              </div>
            </div>
          </div>
          <div style={{position:'absolute',bottom:12,fontSize:10,color:'#aaa',width:'100%',textAlign:'center',left:0}}>
            ID Validasi: {valId} • Jabatan: {data.jabatan} • Unit: {data.unit} • {data.nik}
          </div>
        </div>
      </div>
    </div>
  );
};
